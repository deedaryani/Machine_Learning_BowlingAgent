behaviors:
  BowlingAgent:
    trainer_type: ppo
    max_steps: 50000
    time_horizon: 64
    summary_freq: 1000
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
    hyperparameters:
      batch_size: 64
      buffer_size: 2048
      learning_rate: 1.0e-4
      beta: 5.0e-4
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 2.0
